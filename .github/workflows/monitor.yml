name: Monitor BBMA Signal Channel

permissions:
  contents: write

on:
  workflow_dispatch: {}  # trigger bởi cron-job.org (POST tới /dispatches) hoặc bấm tay để test

concurrency:
  group: monitor-bbma-signal
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet requests

      - name: Run monitor script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor_bbma.py

      - name: Commit updated state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json || true
          git diff --staged --quiet || git commit -m "update last seen message"
          git push || true
